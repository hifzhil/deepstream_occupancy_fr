HTTPPort 8080
HTTPBindAddress 0.0.0.0
MaxHTTPConnections 2000
MaxClients 1000
MaxBandwidth 10000

<Feed camera1.ffm>
File /tmp/camera1.ffm
FileMaxSize 50M
</Feed>

<Feed camera2.ffm>
File /tmp/camera2.ffm
FileMaxSize 50M
</Feed>

<Stream camera1.mjpeg>
Feed camera1.ffm
Format mpjpeg
VideoFrameRate 30
VideoSize 1920x1080
VideoBitRate 4000
VideoIntraOnly
NoAudio
Strict -1
</Stream>

<Stream camera2.mjpeg>
Feed camera2.ffm
Format mpjpeg
VideoFrameRate 30
VideoSize 1920x1080
VideoBitRate 4000
VideoIntraOnly
NoAudio
Strict -1
</Stream>
